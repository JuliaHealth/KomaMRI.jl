  - label: "CPU 1T - Julia 1 - Benchmark"
    if: build.pull_request.labels includes "run-gpu-ci" || build.branch == "master"
    if_changed: "{KomaMRICore/src/**,KomaMRICore/ext/**,KomaMRICore/Project.toml,KomaMRIBase/src/**,KomaMRIBase/Project.toml,benchmarks/**,.buildkite/**,.github/workflows/Benchmark.yml,Project.toml}"
    key: "benchmark-cpu-1"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
    command: |
      julia --project=benchmarks -e 'println("--- :julia: Instantiating project")
          using Pkg
          Pkg.develop([
              PackageSpec(path=pwd(), subdir="KomaMRIBase"),
              PackageSpec(path=pwd(), subdir="KomaMRICore"),
          ])'

      julia --project=benchmarks -e 'println("--- :julia: Run Benchmarks")
          include("benchmarks/runbenchmarks.jl")'
    artifact_paths:
      - "benchmarks/results/*"
    agents:
      arch: "aarch64"
      queue: "juliaecosystem"
      num_cpus: "8"
    env:
      BENCHMARK_GROUP: CPU
      JULIA_NUM_THREADS: "1"
    timeout_in_minutes: 30

