steps:
  - label: ":pipeline: KomaMRICore Upload NoMotion Tests"
    if: build.pull_request.labels includes "run-gpu-ci" || build.branch == "master"
    env:
      TEST_GROUP: "nomotion"
    command: buildkite-agent pipeline upload .buildkite/runtests.yml
    agents:
      queue: "juliagpu"

  - label: ":pipeline: KomaMRICore Upload Motion Tests"
    if: build.pull_request.labels includes "run-gpu-ci" || build.branch == "master"
    env:
      TEST_GROUP: "motion"
    command: buildkite-agent pipeline upload .buildkite/runtests.yml
    agents:
      queue: "juliagpu"

  # Keep the experimental oneAPI backend as its own top-level matrix so it can
  # soft-fail without duplicating checks across the motion/nomotion uploads.
  - label: "KomaMRICore / Test / oneAPI / Julia {{matrix.version}} / core"
    if: build.pull_request.labels includes "run-gpu-ci" || build.branch == "master"
    matrix:
      setup:
        version:
          - "1.10"
          - "1"
    plugins:
      - JuliaCI/julia#v1:
          version: "{{matrix.version}}"
      - JuliaCI/julia-coverage:
          codecov: true
          flags:
            - core
          dirs:
            - KomaMRICore/src
            - KomaMRICore/ext
    env:
      TEST_GROUP: "core"
      CI: "BUILDKITE"
      CODECOV_FLAGS: "core"
      JULIA_PKG_SERVER: ""
      SECRET_CODECOV_TOKEN: ";U2FsdGVkX1+IZLGTj2FNEy4XvUQbzkZFEwUpwIdRDCKrEea5O/OKGV5vYJufty3m9yniE+av4937HabS9dO1RA=="
    command: |
      julia -e 'println("--- :julia: Instantiating project")
          using Pkg
          if !( VERSION < v"1.11" )
              Pkg.activate("KomaMRICore/test")
          end
          Pkg.develop([
              PackageSpec(path=pwd(), subdir="KomaMRIBase"),
              PackageSpec(path=pwd(), subdir="KomaMRICore"),
          ])'

      julia --project=KomaMRICore/test -e 'println("--- :julia: Add oneAPI to test environment")
          using Pkg
          devdir = mktempdir()
          withenv("JULIA_PKG_PRECOMPILE_AUTO" => 0,
                  "JULIA_PKG_DEVDIR" => devdir) do
              Pkg.develop("oneAPI")
              include(joinpath(devdir, "oneAPI", "deps", "build_ci.jl"))
          end'

      julia -e 'println("--- :julia: Running tests")
          using Pkg
          if !( VERSION < v"1.11" )
              Pkg.activate("KomaMRICore/test")
          end
          using oneAPI
          oneAPI.versioninfo()
          Pkg.test("KomaMRICore"; coverage=true, test_args=["oneAPI"])'
    agents:
      queue: "juliagpu"
      intel: "*"
    soft_fail:
      - exit_status: "*"
    timeout_in_minutes: 60

  - label: ":pipeline: KomaMRICore Launch Benchmarks"
    if: build.pull_request.labels includes "run-gpu-ci" || build.branch == "master"
    agents:
      queue: "juliagpu"
    plugins:
      - monorepo-diff#v1.0.1:
          diff: "git diff --name-only HEAD~1"
          interpolation: false
          watch:
            - path:
                - "KomaMRICore/src/**/*"
                - "KomaMRICore/ext/**/*"
                - "KomaMRICore/Project.toml"
                - "KomaMRIBase/src/**/*"
                - "KomaMRIBase/Project.toml"
                - "benchmarks/**/*"
                - ".buildkite/**/*"
                - ".github/workflows/Benchmark.yml"
                - "Project.toml"
              config:
                command: "buildkite-agent pipeline upload .buildkite/runbenchmarks.yml"
                agents:
                  queue: "juliagpu"
