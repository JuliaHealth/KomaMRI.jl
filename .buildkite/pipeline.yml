steps:
  - label: ":pipeline: Upload NoMotion Tests"
    if: build.pull_request.labels includes "run-gpu-ci" || build.branch == "master"
    plugins:
      - sparse-checkout#v1.8.0:
          paths:
            - .buildkite
    env:
      TEST_GROUP: "nomotion"
    command: buildkite-agent pipeline upload .buildkite/runtests.yml
    agents:
      queue: upload

  - label: ":pipeline: Upload Motion Tests"
    if: build.pull_request.labels includes "run-gpu-ci" || build.branch == "master"
    plugins:
      - sparse-checkout#v1.8.0:
          paths:
            - .buildkite
    env:
      TEST_GROUP: "motion"
    command: buildkite-agent pipeline upload .buildkite/runtests.yml
    agents:
      queue: upload

  - label: ":pipeline: Launch Benchmarks"
    if: |
      build.branch == "master" ||
        (
          build.pull_request.labels includes "run-gpu-ci" &&
          !build.pull_request.repository.fork &&
          build.branch !~ /^dependabot\//
        )
    plugins:
      - sparse-checkout#v1.8.0:
          paths:
            - .buildkite
    command: |
      # The sparse checkout starts at depth 1; deepen to depth 2 for HEAD~1.
      git fetch --depth 2 origin "$(git rev-parse HEAD)"
      # Match monorepo-diff#v1.0.1 without creating a second checkout.
      changed_files="$(
        git diff --name-only HEAD~1 -- \
          KomaMRICore/src \
          KomaMRICore/ext \
          KomaMRICore/Project.toml \
          KomaMRIBase/src \
          KomaMRIBase/Project.toml \
          benchmarks \
          .buildkite \
          .github/workflows/Benchmark.yml \
          Project.toml
      )" || exit $?
      if [ -n "$changed_files" ]; then
        buildkite-agent pipeline upload .buildkite/runbenchmarks.yml --no-interpolation
      fi
    agents:
      queue: upload
